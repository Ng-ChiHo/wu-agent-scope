spring:
  application:
    name: wu-agent-scope
  profiles:
    active: local

server:
  port: 8133
  servlet:
    context-path: /api

# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.chiho.wuagentscope.controller

# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn

# mybatis-plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full
  global-config:
    banner: false
  mapper-locations: classpath*:wuagentscope/**/*Mapper.xml

# AgentScope 配置
agentscope:
  # 多模型配置
  models:
    default-model: qwen3:14b
    available:
      - id: qwen3:14b
        provider: ollama
        base-url: http://localhost:11434
        model-name: qwen3:14b
        display-name: "通义千问 14B"
        max-iters: 20
      - id: mfdoom/deepseek-v2-tool-calling:latest
        provider: ollama
        base-url: http://localhost:11434
        model-name: mfdoom/deepseek-v2-tool-calling:latest
        display-name: "DeepSeek V2"
        max-iters: 20
      - id: deepseek-r1:14b
        provider: ollama
        base-url: http://localhost:11434
        model-name: deepseek-r1:14b
        display-name: "DeepSeek R1"
        max-iters: 20
  # 会话状态存储：MysqlAgentStateStore（自动建表，无需额外配置）

# Agent 上下文截断配置
agent:
  context:
    max-rounds: 20  # 保留最近 20 轮对话，超出部分截断（MySQL 中仍保留完整历史）

# OpenTelemetry 配置
otel:
  service:
    name: wu-agent-scope
  exporter:
    enabled: true
    endpoint: http://localhost:4317

# SearXNG 联网搜索配置（Docker 部署，端口 8010）
searxng:
  base-url: http://localhost:8010
  timeout: 10000

# Jina Reader 网页内容提取配置（免费使用，无需 API Key）
jina:
  reader:
    base-url: https://r.jina.ai
    timeout: 30000
    api-key:           # 可选，填写后免费额度更高
    max-length: 8000   # 返回内容最大字符数，避免撑爆 LLM 上下文

# 日志级别
logging:
  level:
    io.agentscope: DEBUG
    io.agentscope.core.model.transport.JdkHttpTransport: INFO
    com.chiho.wuagentscope: INFO
