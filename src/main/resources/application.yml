spring:
  application:
    name: wu-agent-scope
  profiles:
    active: local

server:
  port: 8133
  servlet:
    context-path: /api

# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.chiho.wuagentscope.controller

# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn

# mybatis-plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full
  global-config:
    banner: false
  mapper-locations: classpath*:wuagentscope/**/*Mapper.xml

# AgentScope 配置
agentscope:
  # 多模型配置
  models:
    default-model: qwen3.5:9b
    available:
      - id: qwen3.5:9b
        provider: ollama
        base-url: http://localhost:11434
        model-name: qwen3.5:9b
        display-name: "通义千问3.5 9B（通用）"  ## 256k
        max-iters: 20
        capabilities: [text, vision]
        think: disabled
      - id: qwen3:14b
        provider: ollama
        base-url: http://localhost:11434
        model-name: qwen3:14b
        display-name: "通义千问3 14B（思考）"  ## 40k
        max-iters: 20
        capabilities: [text]
        think: medium
      - id: qwen3-vl:8b
        provider: ollama
        base-url: http://localhost:11434
        model-name: qwen3-vl:8b
        display-name: "通义千问3 VL 8B（视觉）"
        max-iters: 20
        capabilities: [text, vision]
        think: disabled
      - id: qwen2.5-coder:14b
        provider: ollama
        base-url: http://localhost:11434
        model-name: qwen2.5-coder:14b
        display-name: "通义千问2.5 Coder（编码）"
        max-iters: 20
        capabilities: [text]
      - id: deepseek-v2-56k
        provider: ollama
        base-url: http://localhost:11434
        model-name: deepseek-v2-56k
        display-name: "DeepSeek V2（轻量）"  ## 56k
        max-iters: 20
        capabilities: [text]
  # 会话状态存储：MysqlAgentStateStore（自动建表，无需额外配置）

  skills:
    dir: skills

# Agent 上下文截断配置
agent:
  context:
    max-rounds: 20  # 保留最近 10 轮对话（含 RAG 检索结果，实际 token 较多），超出部分截断
    image-keep-rounds: 2  # 保留最近 2 轮图片，更早的消息只保留文字（避免图片撑爆上下文）
  tool-result:
    max-chars: 2000    # 工具返回超过 2000 字符时截断
    preview-chars: 300  # 截断后保留前后各 300 字符

# OpenTelemetry 配置
otel:
  service:
    name: wu-agent-scope
  exporter:
    enabled: true
    endpoint: http://localhost:4317

# SearXNG 联网搜索配置（Docker 部署，端口 8010）
searxng:
  base-url: http://localhost:8010
  timeout: 10000

# Jina Reader 网页内容提取配置（免费使用，无需 API Key）
jina:
  reader:
    base-url: https://r.jina.ai
    timeout: 30000
    api-key:           # 可选，填写后免费额度更高
    max-length: 8000   # 返回内容最大字符数，避免撑爆 LLM 上下文

# RAG 配置（基于 AgentScope 官方 agentscope-extensions-rag-simple 模块）
rag:
  embedding:
    base-url: http://localhost:11434
    model: mxbai-embed-large   # 1024维，精度高；备选 nomic-embed-text（768维，速度快）
    dimensions: 1024

# 日志级别
logging:
  level:
    io.agentscope: DEBUG
    io.agentscope.core.model.transport.JdkHttpTransport: INFO
    com.chiho.wuagentscope: INFO
