spring:
  application:
    name: wu-agent-scope

server:
  port: 8133
  servlet:
    context-path: /api

# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.chiho.wuagentscope.controller

# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn