spring:
  application:
    name: wu-agent-scope
  profiles:
    active: local

server:
  port: 8133
  servlet:
    context-path: /api

# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.chiho.wuagentscope.controller

# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn

# mybatis-plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full
  global-config:
    banner: false
  mapper-locations: classpath*:wuagentscope/**/*Mapper.xml

# AgentScope 配置
agentscope:
  # Ollama 本地模型配置
  ollama:
    base-url: http://localhost:11434
    model-name: qwen3:14b
  # 会话状态存储：MysqlAgentStateStore（自动建表，无需额外配置）

# 日志级别
logging:
  level:
    io.agentscope: DEBUG
